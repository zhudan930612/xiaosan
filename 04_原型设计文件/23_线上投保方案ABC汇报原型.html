<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线上投保方案ABC汇报原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* 方案切换 */
.scheme-tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  background: #fff;
  padding: 8px;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.scheme-tab {
  padding: 10px 28px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  transition: all 0.2s;
}
.scheme-tab:hover { background: #f5f5f5; }
.scheme-tab.active {
  background: linear-gradient(90deg, #27a66d, #4fb3d7);
  color: #fff;
}

/* 手机框架 */
.phone-frame {
  width: 375px;
  background: #fff;
  border-radius: 40px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 8px 24px rgba(0,0,0,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: auto;
}
.phone-screen {
  display: flex;
  flex-direction: column;
  height: auto;
  min-height: 812px;
  background: linear-gradient(180deg, rgba(89,183,216,0.04) 0%, transparent 180px), linear-gradient(180deg, #f6fbf8 0%, #fff 100%);
}

/* 状态栏 */
.status-bar {
  height: 34px;
  background: linear-gradient(90deg, #35ad73, #58b8d7);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  color: #fff;
  font-size: 12px;
  font-weight: 800;
}
.status-bar .time { font-size: 13px; }
.status-icons { display: flex; align-items: center; gap: 4px; }
.signal-icon { display: flex; align-items: flex-end; gap: 1.5px; height: 14px; }
.signal-bar { width: 3px; background: #fff; border-radius: 1px; }
.signal-bar:nth-child(1) { height: 5px; }
.signal-bar:nth-child(2) { height: 8px; }
.signal-bar:nth-child(3) { height: 11px; }
.signal-bar:nth-child(4) { height: 14px; }
.battery-icon { width: 22px; height: 11px; border: 1.5px solid #fff; border-radius: 2.5px; position: relative; display: flex; align-items: center; padding: 1.5px; }
.battery-icon::after { content: ''; position: absolute; right: -3px; top: 3px; width: 1.5px; height: 4px; background: #fff; border-radius: 0 1px 1px 0; }
.battery-fill { width: 60%; height: 100%; background: #fff; border-radius: 1px; }

/* 导航栏 */
.nav-bar {
  background: linear-gradient(90deg, #35ad73, #58b8d7);
  padding: 10px 18px 14px;
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
}
.back-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; font-weight: 300; cursor: pointer; }
.nav-title { text-align: center; color: #fff; font-size: 18px; font-weight: 800; }

/* Tab栏 */
.tab-bar {
  background: #f1f3f1;
  border-radius: 30px 30px 0 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.32);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 18px 4px 16px;
}
.tab-item { text-align: center; font-size: 14px; font-weight: 700; color: #303631; padding: 8px 0; cursor: pointer; border-radius: 26px 0 0 0; }
.tab-item.active { background: linear-gradient(135deg, #fff 0%, #eef9f3 60%, #f4fcff 100%); color: #1a8f62; font-weight: 800; box-shadow: -10px 0 20px rgba(83,183,216,0.08); }

/* 内容区域 */
.content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; min-height: 520px; }

/* 政策卡片 */
.policy-card { background: linear-gradient(180deg, #ecf8f1 0%, #f7fbfd 100%); border: 2px solid rgba(34,166,109,0.72); border-radius: 22px; overflow: hidden; }
.policy-head { background: linear-gradient(90deg, #35ad73, #58b8d7); color: #fff; padding: 14px 16px; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.policy-head-icon { width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.policy-body { padding: 16px; }
.policy-title { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 6px; }
.policy-subtitle { font-size: 13px; color: #666; margin-bottom: 12px; line-height: 1.5; }
.policy-detail-btn { display: inline-block; background: #333; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* 卡片通用 */
.entry-card { background: #fff; border-radius: 18px; padding: 16px; border: 1px solid #d7e3db; box-shadow: 0 12px 28px rgba(26,41,32,0.05); }
.section-title { font-size: 17px; font-weight: 600; color: #000; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 4px; height: 18px; background: linear-gradient(180deg, #35ad73, #58b8d7); border-radius: 2px; }

/* 投保方式 */
.insure-method { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.method-label { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: #333; }
.method-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #e6f7f0, #d4f0e5); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.method-icon svg { width: 18px; height: 18px; stroke: #00B578; stroke-width: 2; fill: none; }
.recommend-tag { background: linear-gradient(90deg, #ff9500, #ffaa33); color: #fff; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }

/* 步骤 */
.step-indicator { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
.step-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #999; }
.step-num { width: 20px; height: 20px; border-radius: 50%; background: #e5e5e5; color: #999; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.step-item.active .step-num { background: linear-gradient(135deg, #35ad73, #58b8d7); color: #fff; }
.step-item.active { color: #1a8f62; font-weight: 600; }
.step-arrow { color: #ccc; font-size: 12px; }

/* 保险公司 */
.company-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.company-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 8px; border: 2px solid #e5e5e5; border-radius: 12px; cursor: pointer; transition: all 0.2s; background: #fff; position: relative; }
.company-item:hover, .company-item.selected { border-color: #00B578; background: linear-gradient(180deg, #ebf8f1, #fff); box-shadow: 0 4px 12px rgba(0,181,120,0.12); }
.company-logo { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
.company-name { font-size: 12px; color: #333; font-weight: 500; }
.company-price { font-size: 14px; font-weight: 700; color: #ff9500; margin-top: 2px; }
.company-risk { font-size: 11px; color: #999; margin-top: 2px; }
.selected-mark { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background: #00B578; border-radius: 50%; display: none; align-items: center; justify-content: center; }
.selected-mark svg { width: 10px; height: 10px; stroke: #fff; stroke-width: 3; fill: none; }
.company-item.selected .selected-mark { display: flex; }
.pingan { background: linear-gradient(135deg, #ff6b35, #ff8c5a); }
.guoren { background: linear-gradient(135deg, #1e5aa8, #3a7bd5); }
.renbao { background: linear-gradient(135deg, #c41e3a, #e63950); }
.renshou { background: linear-gradient(135deg, #0d8a56, #1aad6e); }
.taiping { background: linear-gradient(135deg, #e6a817, #f5c02c); }
.yangguang { background: linear-gradient(135deg, #f7931e, #ffb347); }

/* 卖点 */
.selling-point { background: linear-gradient(180deg, #ebf8f1 0%, #fff 100%); border: 2px solid rgba(34,166,109,0.5); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
.sp-title { font-size: 15px; font-weight: 700; color: #1a8f62; margin-bottom: 4px; }
.sp-desc { font-size: 13px; color: #666; margin-bottom: 10px; }
.sp-features { display: flex; flex-wrap: wrap; gap: 8px; }
.sp-feature { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #333; }
.sp-feature svg { width: 14px; height: 14px; stroke: #00B578; stroke-width: 2.5; fill: none; }

/* 关联线下 */
.offline-link { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; cursor: pointer; margin-bottom: 12px; }
.offline-link-text { font-size: 15px; color: #333; font-weight: 500; }
.offline-link-desc { font-size: 12px; color: #999; margin-top: 2px; }
.offline-link-arrow { color: #999; font-size: 18px; }

/* 风险等级标签（方案C） */
.risk-level-card { background: #fff; border-radius: 14px; padding: 14px 16px; border: 1px solid #e5e5e5; margin-bottom: 12px; }
.risk-level-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.risk-level-label { font-size: 14px; color: #666; }
.risk-level-tag { padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.risk-low { background: #E6F7F0; color: #00B578; }
.risk-midlow { background: #F0F9EB; color: #67C23A; }
.risk-mid { background: #FFFBE6; color: #FF9500; }
.risk-high { background: #FFF2F0; color: #FF4D4F; }
.risk-extreme { background: #FFEDED; color: #CF1322; }
.risk-level-desc { font-size: 12px; color: #999; }

/* 客服 */
.service-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: linear-gradient(90deg, #f2faf5, #f5fbfe); border: 1px solid rgba(34,166,109,0.12); border-radius: 20px; }
.service-info { display: flex; align-items: center; gap: 10px; }
.service-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #35ad73, #58b8d7); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
.service-text { font-size: 13px; color: #666; }

/* 底部按钮 */
.bottom-actions { padding: 12px 16px 24px; display: flex; gap: 12px; background: #fff; border-top: 1px solid #f0f0f0; }
.btn-secondary { flex: 1; height: 50px; border: 1px solid #00B578; background: #fff; color: #00B578; border-radius: 16px; font-size: 17px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-primary { flex: 2; height: 50px; background: linear-gradient(90deg, #26a66d, #4fb3d7); color: #fff; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 12px 30px rgba(34,166,109,0.26); }
.btn-primary:disabled { background: linear-gradient(90deg, #ccc, #ddd); box-shadow: none; cursor: not-allowed; }

/* 弹窗 */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal-box { width: 320px; background: #fff; border-radius: 20px; padding: 24px 20px 20px; text-align: center; animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
.modal-icon { width: 56px; height: 56px; background: linear-gradient(135deg, #e6f7f0, #d4f0e5); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.modal-icon svg { width: 28px; height: 28px; stroke: #00B578; stroke-width: 2; fill: none; }
.modal-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 8px; }
.modal-desc { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
.modal-actions { display: flex; gap: 12px; }
.modal-btn-cancel { flex: 1; height: 44px; border: 1px solid #e5e5e5; background: #fff; color: #333; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.modal-btn-confirm { flex: 1; height: 44px; background: linear-gradient(90deg, #26a66d, #4fb3d7); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

/* 线下软卡点弹窗 */
.offline-modal-box { width: 340px; background: #fff; border-radius: 20px; padding: 0; overflow: hidden; animation: modalIn 0.3s ease; }
.offline-modal-header { padding: 20px 20px 0; font-size: 17px; font-weight: 700; color: #333; text-align: center; }
.offline-modal-body { padding: 16px 20px; }
.offline-compare { display: flex; gap: 10px; margin-bottom: 16px; }
.offline-compare-item { flex: 1; background: #f8f8f8; border-radius: 12px; padding: 14px 12px; }
.offline-compare-item.online { background: linear-gradient(180deg, #ebf8f1, #fff); border: 1px solid rgba(34,166,109,0.3); }
.offline-compare-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 8px; text-align: center; }
.offline-compare-item.online .offline-compare-title { color: #1a8f62; }
.offline-compare-list { font-size: 12px; color: #666; line-height: 1.8; }
.offline-compare-list li { margin-bottom: 4px; list-style: none; }
.offline-compare-list li::before { content: '✓'; color: #00B578; margin-right: 4px; }
.offline-compare-item.online .offline-compare-list li::before { content: '✓'; color: #00B578; }
.offline-reason-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 10px; }
.offline-reason-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.offline-reason-option { padding: 8px 14px; border: 1px solid #e5e5e5; border-radius: 20px; font-size: 13px; color: #666; cursor: pointer; background: #fff; }
.offline-reason-option.selected { border-color: #00B578; background: #E6F7F0; color: #1a8f62; }
.offline-modal-actions { display: flex; flex-direction: column; gap: 10px; padding: 0 20px 20px; }
.offline-btn-upload { width: 100%; height: 46px; background: #fff; color: #666; border: 1px solid #e5e5e5; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.offline-btn-switch { width: 100%; height: 46px; background: linear-gradient(90deg, #26a66d, #4fb3d7); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

/* 线下表单 */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.form-label .required { color: #ff4d4f; }
.form-input { width: 100%; height: 44px; border: 1px solid #e5e5e5; border-radius: 10px; padding: 0 12px; font-size: 15px; background: #fff; display: flex; align-items: center; color: #999; }
.form-input.has-value { color: #333; }
.form-textarea { width: 100%; height: 80px; border: 1px solid #e5e5e5; border-radius: 10px; padding: 10px 12px; font-size: 15px; background: #fff; resize: none; }
.upload-box { width: 100%; height: 80px; border: 2px dashed #00B578; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; background: #f8f8f8; }
.upload-box svg { width: 24px; height: 24px; stroke: #00B578; stroke-width: 2; fill: none; }
.upload-text { font-size: 13px; color: #00B578; }

/* 支付页 */
.pay-content { padding: 32px 20px; text-align: center; flex: 1; }
.pay-amount { font-size: 48px; font-weight: 700; color: #ff9500; margin-bottom: 24px; }
.pay-amount-unit { font-size: 24px; }
.pay-info { background: #f8f8f8; border-radius: 14px; padding: 16px; margin-bottom: 24px; }
.pay-info-item { display: flex; justify-content: space-between; padding: 10px 0; font-size: 15px; }
.pay-info-item:not(:last-child) { border-bottom: 1px solid #eee; }
.pay-info-label { color: #666; }
.pay-info-value { color: #333; font-weight: 500; }
.pay-method-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border: 2px solid #e5e5e5; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
.pay-method-item.selected { border-color: #00B578; background: linear-gradient(90deg, #f2faf5, #f5fbfe); }
.pay-method-left { display: flex; align-items: center; gap: 10px; }
.pay-method-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; font-weight: 700; }
.weixin { background: #07c160; }
.alipay { background: #1677ff; }
.pay-method-name { font-size: 15px; color: #333; }
.pay-radio { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.pay-method-item.selected .pay-radio { border-color: #00B578; background: #00B578; }
.pay-radio-inner { width: 8px; height: 8px; background: #fff; border-radius: 50%; display: none; }
.pay-method-item.selected .pay-radio-inner { display: block; }
.pay-btn { margin: 20px 20px 30px; height: 52px; background: linear-gradient(90deg, #ff9500, #ffaa33); color: #fff; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 24px rgba(255,149,0,0.3); }

/* 加载中 */
.loading-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.loading-spinner { width: 56px; height: 56px; border: 3px solid #e6f7f0; border-top-color: #00B578; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 8px; }
.loading-sub { font-size: 13px; color: #999; }

/* 成功页 */
.success-card { background: linear-gradient(180deg, #ebf8f1 0%, #fff 100%); border: 2px solid rgba(34,166,109,0.5); border-radius: 18px; padding: 24px 16px; text-align: center; margin-bottom: 16px; }
.success-icon { width: 56px; height: 56px; background: linear-gradient(135deg, #35ad73, #58b8d7); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.success-icon svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 3; fill: none; }
.success-title { font-size: 20px; font-weight: 700; color: #1a8f62; margin-bottom: 4px; }
.success-badge { display: inline-block; background: linear-gradient(90deg, #35ad73, #58b8d7); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
.success-info { text-align: left; }
.success-info-item { display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; border-bottom: 1px solid #e8f5ee; }
.success-info-label { color: #666; }
.success-info-value { color: #333; font-weight: 500; }

/* 小IDI卡片 */
.xiaoidi-card { background: linear-gradient(135deg, #fff8f0 0%, #fff0e6 100%); border: 2px solid rgba(255, 149, 0, 0.6); border-radius: 18px; padding: 18px 16px; margin-bottom: 16px; }
.xiaoidi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.xiaoidi-title-wrap { display: flex; align-items: center; gap: 8px; }
.xiaoidi-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #ff9500, #ffaa33); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
.xiaoidi-title { font-size: 16px; font-weight: 700; color: #333; }
.xiaoidi-recommend-tag { background: linear-gradient(90deg, #ff4d4f, #ff7875); color: #fff; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }
.xiaoidi-desc { font-size: 14px; color: #666; margin-bottom: 12px; line-height: 1.5; }
.xiaoidi-benefits { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.xiaoidi-benefit { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #333; background: rgba(255, 149, 0, 0.08); padding: 4px 10px; border-radius: 6px; }
.xiaoidi-actions { display: flex; gap: 10px; }
.xiaoidi-btn-primary { flex: 1; height: 44px; background: linear-gradient(90deg, #ff9500, #ffaa33); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 149, 0, 0.25); }
.xiaoidi-btn-skip { padding: 0 12px; height: 44px; background: transparent; color: #999; border: none; font-size: 14px; cursor: pointer; }

/* 失败页 */
.fail-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.fail-icon { width: 72px; height: 72px; background: #fff2f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.fail-icon svg { width: 36px; height: 36px; stroke: #ff4d4f; stroke-width: 2.5; fill: none; }
.fail-title { font-size: 22px; font-weight: 700; color: #333; margin-bottom: 8px; }
.fail-reason { font-size: 14px; color: #666; margin-bottom: 32px; text-align: center; line-height: 1.6; }

/* 页面标签 */

    match: renderMatch,

// 交互函数
function setScheme(s) {
  state.scheme = s;
  state.page = 'match';
  state.selectedCompany = null;
  state.xiaoidiSkipped = false;
  render();
}

function selectCompany(c) {
  state.selectedCompany = c;
  render();
  setTimeout(() => showModal('confirmModal'), 150);
}

function showModal(id) {
  document.getElementById(id).classList.add('active');
}

function hideModal(id) {
  document.getElementById(id).classList.remove('active');
}

function showConfirmModal() {
  if (!state.selectedCompany) return;
  showModal('confirmModal');
}

function showOfflineModal() {
  state.selectedReason = null;
  showModal('offlineModal');
}

function selectReason(el) {
  document.querySelectorAll('#reasonOptions .offline-reason-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedReason = el.textContent;
}

function goToPay() {
  hideModal('confirmModal');
  changePage('pay');
}

function goToLoading() {
  changePage('loading');
  setTimeout(() => {
    state.xiaoidiSkipped = false;
    changePage('success');
  }, 2000);
}

function goToOfflineForm() {
  hideModal('offlineModal');
  changePage('offline-form');
}

function changePage(p) {
  state.page = p;
  render();
}

function goBack() {
  const backMap = { pay: 'match', loading: 'match', success: 'match', fail: 'match', 'offline-form': 'match' };
  if (backMap[state.page]) changePage(backMap[state.page]);
}

function selectPayMethod(el) {
  document.querySelectorAll('.pay-method-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
}

function skipXiaoIDI() {
  state.xiaoidiSkipped = true;
  render();
}

function restoreXiaoIDI() {
  state.xiaoidiSkipped = false;
  render();
}

// 初始化
render();
</script>
